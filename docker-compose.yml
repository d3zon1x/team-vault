services:
  backend:
    build:
      context: ./backend
    container_name: teamvault_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - minio

  frontend:
    build:
      context: ./frontend
    container_name: teamvault_frontend
    ports:
      - "5173:5173"
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  postgres:
    image: postgres:16
    container_name: teamvault_postgres
    environment:
      POSTGRES_DB: teamvault
      POSTGRES_USER: teamvault
      POSTGRES_PASSWORD: teamvault
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: teamvault_redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: teamvault_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: teamvault
      MINIO_ROOT_PASSWORD: teamvault123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data: